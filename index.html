function rAdmin(){var totalRevenue=O.filter(function(o){return o.status!=="cancelled"}).reduce(function(s,o){return s+o.total},0);var pendingOrders=O.filter(function(o){return o.status==="pending"}).length;var activeProducts=P.filter(function(p){return p.s>0}).length;var totalOrders=O.length;var h="<div class='sec'><h2>ждЃТљ│ "+t("dashboard")+"</h2>";h+="<div class='stats'><div class='stat'><div class='sv' style='color:var(--gc)'>"+cp(totalRevenue)+"</div><div class='sl'>"+t("revenue")+"</div></div>";h+="<div class='stat'><div class='sv' style='color:var(--ac)'>"+totalOrders+"</div><div class='sl'>"+t("orders")+"</div></div>";h+="<div class='stat'><div class='sv' style='color:var(--gr)'>"+activeProducts+"</div><div class='sl'>"+t("active")+"</div></div>";h+="<div class='stat'><div class='sv' style='color:var(--rd)'>"+pendingOrders+"</div><div class='sl'>"+t("pending")+"</div></div></div>";h+="<h4 style='color:var(--gc);margin:16px 0 8px'>ждЃТљх "+t("recentOrders")+"</h4>";var recent=O.slice(0,5);if(recent.length===0)h+="<div style='padding:20px;text-align:center;color:var(--t3)'>"+t("noOrders")+"</div>";else{h+="<div class='tbl-container'><table class='tbl'><tr><th>уњЂсѕат┤ЪжЇЎ?/th><th>уђ╣сѕАтЪЏ</th><th>жќ▓ТѕдЬќѓ</th><th>жљўУѕхРѓг?/th><th>жЈЃсЃдТ╣А</th></tr>";recent.forEach(function(o){h+="<tr><td>#"+String(o.id).slice(-6)+"</td><td>"+o.customer.name+"</td><td style='color:var(--gc)'>"+fp(o.total)+"</td><td>"+statusBadge(o.status)+"</td><td>"+fd(o.date)+"</td></tr>"});h+="</table></div>"}h+="<h4 style='color:var(--gc);margin:16px 0 8px'>жѕ┐ТгЎугЇ "+t("settings")+"</h4>";h+="<div class='f-row'><label>Тљ┤ТЦђТѓЋ</label><input id='admName' value='"+SET.name+"'></div>";h+="<div class='f-row'><label>"+t("phone")+"</label><input id='admPhone' value='"+(SET.phone||"")+"'></div>";h+="<div class='f-row'><label>т»░Ьє╗С┐і</label><input id='admWx' value='"+(SET.wechat||"")+"'></div>";h+="<div class='f-row'><label>"+t("email")+"</label><input id='admEmail' value='"+(SET.email||"")+"'></div>";h+="<div class='f-row'><label>"+t("addr")+"</label><input id='admAddr' value='"+(SET.addr||"")+"'></div>";h+="<div class='m-acts' style='margin-top:8px'><button class='btn btn-gold' onclick='saveSettings()'>ждЃТЇЉ "+t("save")+"</button></div>";h+="<div style='display:flex;gap:10px;margin-top:12px;flex-wrap:wrap'>";h+="<button class='btn btn-out' onclick='exportData()'>ждЃТЉЏ "+t("export")+"</button>";h+="<button class='btn btn-out' onclick='importData()'>ждЃТЉю "+t("import")+"</button>";h+="<button class='btn btn-red' onclick='resetData()'>ждЃТћД жќ▓тХЄуќєжЈЂуЅѕтхЂ</button></div>";return h+="</div>"}
function saveSettings(){SET.name=document.getElementById("admName").value.trim()||SET.name;SET.phone=document.getElementById("admPhone").value.trim();SET.wechat=document.getElementById("admWx").value.trim();SET.email=document.getElementById("admEmail").value.trim();SET.addr=document.getElementById("admAddr").value.trim();save("set");document.getElementById("storeTitle").textContent="ждЃтйё "+SET.name;toast("уњЂтЅДуќєт«ИУ╣Гу╣џуђЏ?)}
function exportData(){var d={products:P,orders:O,customers:CS,settings:SET,exportDate:new Date().toISOString()};var b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=SET.name.replace(/\s/g,"_")+"_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();toast("уђхуЁјтџГжј┤ТёгтДЏ")}
function importData(){var input=document.createElement("input");input.type="file";input.accept=".json";input.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.products)P=d.products;if(d.orders)O=d.orders;if(d.customers)CS=d.customers;if(d.settings){SET=d.settings;document.getElementById("storeTitle").textContent="ждЃтйё "+SET.name}save("p");save("o");save("cs");save("set");nav("admin");toast("уђхуЁјтЈєжј┤ТёгтДЏ")}catch(err){toast("жЈѓтЏдТгбжЈЇуЁју┤Ажќ┐ТгњЬЄц","err")}};r.readAsText(f)};input.click()}
function resetData(){if(!confirm("у║ГЬє╝уЋЙуЉЋСЙђтЎИу╝ЃЬєйтбЇжЈѕтцІТџЪжј╣ЬЄєу┤хтДЮсѓєТљиТхБТ╗ђугЅжЇЎЬѕЏТїЎжќ┐РѓгжћЏ?))return;localStorage.removeItem("pp_p");localStorage.removeItem("pp_o");localStorage.removeItem("pp_c");localStorage.removeItem("pp_cs");localStorage.removeItem("pp_set");location.reload()}
// === IMAGE UPLOAD ===
var imgTarget="",tempImgData="";
function pickImg(target){imgTarget=target;tempImgData="";document.getElementById("imgModal").classList.add("show");document.getElementById("imgPrev").innerHTML='<span class="ph">ждЃТЉ▓ жљљуЉ░тџ«ТХЊтЕЂу┤Х</span>';document.getElementById("imgUrl").value=""}
function handleImg(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){tempImgData=ev.target.result;document.getElementById("imgPrev").innerHTML='<img src="'+tempImgData+'" alt="preview">'};reader.readAsDataURL(file)}
function confirmImg(){if(!tempImgData){var url=document.getElementById("imgUrl").value.trim();if(url)tempImgData=url}if(!tempImgData){toast("уњЄт│░тјЏжќФтцІтФежЇЦтЅДтбќжј┤ТагуиГжЇЈЬЎЏRL","err");return}if(imgTarget==="product"){document.getElementById("pfIu").value=tempImgData;document.getElementById("pfImgPrev").innerHTML='<img src="'+tempImgData+'">'}closeImgModal()}
function closeImgModal(){document.getElementById("imgModal").classList.remove("show");imgTarget="";tempImgData=""}
// === MODAL ===
function openModal(h){document.getElementById("modalBody").innerHTML=h;document.getElementById("modal").classList.add("show")}
function closeModal(){document.getElementById("modal").classList.remove("show")}
// === TOAST ===
function toast(msg,type){var el=document.createElement("div");el.className="toast toast-"+(type==="err"?"err":"ok");el.textContent=msg;el.style.position="fixed";el.style.top="16px";el.style.right="16px";el.style.padding="12px 20px";el.style.borderRadius="8px";el.style.fontSize="13px";el.style.zIndex="999";el.style.boxShadow="0 4px 12px rgba(0,0,0,.4)";el.style.color="#fff";el.style.background=type==="err"?"var(--rd)":"var(--gr)";el.style.animation="fadeIn .3s";document.body.appendChild(el);setTimeout(function(){el.remove()},3000)}
// === INIT ===
init();
</script>
