<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>旋转乒乓 - 乒乓球装备商城</title>
<style>
:root{--bg:#0f0f15;--card:#1a1a25;--bor:#2a2a3a;--t:#e0e0e8;--t2:#9090a0;--gc:#d4a853;--gl:linear-gradient(135deg,#d4a853,#e8c97a)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font:15px/1.6 "Microsoft YaHei","PingFang SC",sans-serif}
.bar{position:sticky;top:0;z-index:100;background:#151520;border-bottom:1px solid var(--bor);display:flex;align-items:center;padding:10px 16px;gap:10px}
.bar .logo{font-size:20px;font-weight:700;background:var(--gl);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.bar input{flex:1;max-width:400px;padding:8px 14px;border-radius:20px;border:1px solid var(--bor);background:#1e1e30;color:var(--t);font-size:14px;outline:none}
.bar input:focus{border-color:var(--gc)}
.bar .cart-btn{background:none;border:1px solid var(--bor);color:var(--t);padding:8px 14px;border-radius:20px;cursor:pointer;font-size:14px}
.bar .cart-btn:hover{border-color:var(--gc)}
.cats{display:flex;gap:6px;padding:12px 16px;flex-wrap:wrap;background:#12121e;border-bottom:1px solid var(--bor);position:sticky;top:52px;z-index:99}
.cats span{padding:5px 14px;border-radius:14px;font-size:13px;cursor:pointer;background:#1a1a28;color:var(--t2);border:1px solid transparent;transition:.15s}
.cats span:hover,.cats span.on{color:var(--gc);border-color:var(--gc);background:rgba(212,168,83,.08)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;padding:16px}
.card{border:1px solid var(--bor);border-radius:10px;overflow:hidden;background:var(--card);transition:.2s;cursor:pointer}
.card:hover{transform:translateY(-2px);border-color:var(--gc);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card .img{height:150px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#1a1a28,#22223a);position:relative}
.card .img .tag{position:absolute;top:8px;left:8px;background:var(--gl);color:#000;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.card .bd{padding:12px}
.card h3{font-size:15px;margin-bottom:4px}
.card .desc{font-size:12px;color:var(--t2);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .ft{display:flex;justify-content:space-between;align-items:center}
.card .price{font-size:18px;font-weight:700;color:var(--gc)}
.card .price s{font-size:12px;color:#666;margin-left:6px}
.card .stock{font-size:11px;color:var(--t2)}
.card .add{background:var(--gl);color:#000;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.card .add:hover{opacity:.9}
.empty{text-align:center;padding:60px;color:var(--t2)}
.cart-panel{position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100vh;background:#151520;border-left:1px solid var(--bor);z-index:200;transform:translateX(100%);transition:.3s;display:flex;flex-direction:column}
.cart-panel.open{transform:translateX(0)}
.cart-panel .ch{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--bor)}
.cart-panel .ch h3{font-size:16px}
.cart-panel .ch button{background:none;border:none;color:var(--t);font-size:20px;cursor:pointer}
.cart-items{flex:1;overflow-y:auto;padding:10px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid var(--bor);font-size:13px}
.cart-item .qty{display:flex;gap:6px;align-items:center}
.cart-item .qty button{background:var(--bor);border:none;color:var(--t);width:24px;height:24px;border-radius:4px;cursor:pointer}
.cart-sum{text-align:right;padding:16px;border-top:1px solid var(--bor);font-size:16px}
.cart-sum button{margin-top:10px;background:var(--gl);color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;font-size:15px}
.toast{position:fixed;top:16px;right:16px;background:#3fb950;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));padding:10px}.card .img{height:120px;font-size:36px}}
</style>
</head>
<body>
<div class="bar">
<span class="logo">🏓 旋转乒乓</span>
<input id="search" placeholder="🔍 搜索商品..." oninput="filter()">
<button class="cart-btn" onclick="toggleCart()">🛒 <span id="cc">0</span></button>
</div>
<div class="cats" id="cats"></div>
<div class="grid" id="products"></div>
<div class="empty" id="empty"></div>

<div class="cart-panel" id="cartPanel">
<div class="ch"><h3>🛒 购物车</h3><button onclick="toggleCart()">✕</button></div>
<div class="cart-items" id="cartItems"><div style="text-align:center;padding:40px;color:var(--t2)">购物车为空</div></div>
<div class="cart-sum" id="cartSum"></div>
</div>

<script>
var products = [
{id:1,name:"专业碳纤维球拍",cat:"底板",price:299,orig:399,stock:50,img:"🏓",desc:"5木2碳结构，速度快旋转强，适合进攻型打法",specs:"重量:85g±3g | 层数:5+2 | 拍柄:FL",feat:true},
{id:2,name:"训练级纯木球拍",cat:"底板",price:129,orig:169,stock:80,img:"🏸",desc:"7层纯木，手感柔和控球好，适合初学者到中级",specs:"重量:80g±3g | 层数:7 | 拍柄:CS",feat:false},
{id:3,name:"三星比赛用球10只装",cat:"乒乓球",price:59,orig:69,stock:200,img:"🏓",desc:"ITTF认证比赛用球，弹性均匀耐打",specs:"星级:三星 | 数量:10只 | 颜色:白",feat:true},
{id:4,name:"一星训练球100只装",cat:"乒乓球",price:89,orig:99,stock:150,img:"⚪",desc:"高性价比训练球，弹跳稳定，适合多球训练",specs:"星级:一星 | 数量:100只",feat:false},
{id:5,name:"防滑乒乓球鞋",cat:"球鞋",price:189,orig:239,stock:40,img:"👟",desc:"透气网面+橡胶大底，抓地力强，快速移动不滑",specs:"尺码:36-44 | 颜色:黑/白",feat:false},
{id:6,name:"专业球拍套",cat:"配件",price:49,orig:59,stock:100,img:"🎓",desc:"加厚防护，可放2支球拍+3颗球",specs:"容量:2拍+球 | 材质:牛津布",feat:false},
{id:7,name:"运动速干毛巾",cat:"配件",price:39,orig:49,stock:120,img:"🧣",desc:"冷感面料快速吸汗，运动必备",specs:"尺寸:80x40cm | 材质:冷感纤维",feat:true},
{id:8,name:"乒乓球训练器套装",cat:"配件",price:128,orig:168,stock:30,img:"🎾",desc:"发球机+集球网套装，高效训练",specs:"含:发球机x1+集球网x1+球x50",feat:false},
{id:9,name:"防滑手柄胶带3卷装",cat:"配件",price:25,orig:35,stock:200,img:"🎀",desc:"吸汗防滑，握感舒适",specs:"数量:3卷 | 颜色:随机",feat:false},
{id:10,name:"折叠式裁判椅",cat:"器材",price:258,orig:298,stock:20,img:"🪑",desc:"轻便折叠，高度可调，裁判必备",specs:"高度:可调 | 承重:150kg",feat:false}
];

var cart = [];
var currentCat = "all";

function getStorage(key,def){
try{var v=localStorage.getItem("pp_"+key);return v?JSON.parse(v):def}catch(e){return def}
}
function setStorage(key,val){
try{localStorage.setItem("pp_"+key,JSON.stringify(val))}catch(e){}
}

function init(){
cart = getStorage("cart",[]);
renderCats();
renderProducts();
updateCartBadge();
}

function renderCats(){
var cats = ["all"];
products.forEach(function(p){if(cats.indexOf(p.cat)===-1)cats.push(p.cat)});
var labels = {all:"全部",底板:"底板",乒乓球:"乒乓球",球鞋:"球鞋",配件:"配件",器材:"器材"};
var h = "";
cats.forEach(function(c){
h += '<span class="'+(currentCat===c?"on":"")+'" onclick="currentCat=\''+c+'\';renderProducts()">'+labels[c]+'</span>';
});
document.getElementById("cats").innerHTML = h;
}

function renderProducts(){
var list = currentCat==="all"?products:products.filter(function(p){return p.cat===currentCat});
var q = document.getElementById("search").value.trim().toLowerCase();
if(q) list = list.filter(function(p){return p.name.toLowerCase().indexOf(q)>-1||p.desc.toLowerCase().indexOf(q)>-1});

var grid = document.getElementById("products");
var empty = document.getElementById("empty");

if(list.length===0){
grid.innerHTML = "";
empty.innerHTML = '<div style="padding:60px;color:var(--t2)">😕 没有找到匹配的商品</div>';
return;
}
empty.innerHTML = "";

var h = "";
list.forEach(function(p){
var tag = p.feat?'<div class="tag">推荐</div>':'';
var low = p.stock<30?'<div class="tag" style="background:#f85149;color:#fff">仅剩'+p.stock+'件</div>':'';
h += '<div class="card">';
h += '<div class="img">'+p.img+tag+low+'</div>';
h += '<div class="bd">';
h += '<h3>'+p.name+'</h3>';
h += '<div class="desc">'+p.desc+'</div>';
h += '<div class="ft">';
h += '<div><span class="price">¥'+p.price+'</span><s>¥'+p.orig+'</s></div>';
h += '<button class="add" onclick="addToCart('+p.id+')">+ 加入</button>';
h += '</div></div></div>';
});
grid.innerHTML = h;
}

function filter(){
renderProducts();
}

function addToCart(id){
var p = products.find(function(x){return x.id===id});
if(!p || p.stock<=0){toast("库存不足!");return}
var ci = cart.find(function(x){return x.id===id});
if(ci){if(ci.qty<p.stock)ci.qty++}else{cart.push({id:id,qty:1})}
setStorage("cart",cart);
updateCartBadge();
renderCartItems();
toast(p.name+" 已加入购物车");
}

function removeFromCart(id){
cart = cart.filter(function(x){return x.id!==id});
setStorage("cart",cart);
updateCartBadge();
renderCartItems();
}

function updateCartBadge(){
var cnt = cart.reduce(function(s,i){return s+i.qty},0);
document.getElementById("cc").textContent = cnt;
}

function toggleCart(){
var p = document.getElementById("cartPanel");
p.classList.toggle("open");
if(p.classList.contains("open")) renderCartItems();
}

function renderCartItems(){
var div = document.getElementById("cartItems");
if(cart.length===0){
div.innerHTML = '<div style="text-align:center;padding:40px;color:var(--t2)">购物车为空</div>';
document.getElementById("cartSum").innerHTML = "";
return;
}
var h = "";
var total = 0;
cart.forEach(function(ci){
var p = products.find(function(x){return x.id===ci.id});
if(!p) return;
var sub = p.price * ci.qty;
total += sub;
h += '<div class="cart-item"><div><b>'+p.name+'</b><br><span style="font-size:12px;color:var(--t2)">¥'+p.price+'</span></div><div class="qty"><button onclick="changeQty('+p.id+','+(ci.qty-1)+')">-</button><span>'+ci.qty+'</span><button onclick="changeQty('+p.id+','+(ci.qty+1)+')">+</button></div><span>¥'+sub+'</span><button style="background:none;border:none;color:#f85149;cursor:pointer" onclick="removeFromCart('+p.id+')">✕</button></div>';
});
div.innerHTML = h;
document.getElementById("cartSum").innerHTML = '<div style="font-weight:700">合计: <span style="color:var(--gc)">¥'+total.toLocaleString()+'</span></div><button onclick="checkout()">提交订单</button>';
}

function changeQty(id,qty){
var ci = cart.find(function(x){return x.id===id});
if(!ci) return;
var p = products.find(function(x){return x.id===id});
if(qty<1) qty=1;
if(p && qty>p.stock) qty=p.stock;
ci.qty = qty;
setStorage("cart",cart);
updateCartBadge();
renderCartItems();
}

function checkout(){
if(cart.length===0){toast("购物车为空!");return}
var name = prompt("请输入姓名：","");
if(!name) return;
var phone = prompt("请输入电话：","");
if(!phone) return;
var total = cart.reduce(function(s,i){var p=products.find(function(x){return x.id===i.id});return s+(p?p.price*i.qty:0)},0);
var items = cart.map(function(i){var p=products.find(function(x){return x.id===i.id});return p?p.name+" x"+i.qty+" ¥"+p.price*i.qty:""}).join("\n");
var no = "PP"+Date.now().toString(36).toUpperCase();
alert("✅ 订单已提交！\n\n订单号："+no+"\n客户："+name+"\n电话："+phone+"\n金额：¥"+total.toLocaleString()+"\n\n商品：\n"+items+"\n\n我们会尽快与您联系确认！");
cart = [];
setStorage("cart",cart);
updateCartBadge();
toggleCart();
}

function toast(msg){
var el = document.createElement("div");
el.className = "toast";
el.textContent = msg;
document.body.appendChild(el);
setTimeout(function(){el.remove()},2000);
}

init();
</script>
</body>
</html>
