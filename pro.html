function openProdForm(id){var p=id?P.find(function(x){return x.id===id}):null;var h='<h2>'+(p?t("editProduct"):t("addProd"))+'</h2>';h+='<div class="f-row"><label>'+t("name")+'</label><input id="pfN" value="'+(p?p.n:"")+'"></div>';h+='<div class="f-row"><label>'+t("ctg")+'</label><select id="pfC"><option value="底板"'+(p&&p.c==="底板"?' selected':'')+'>底板</option><option value="乒乓球"'+(p&&p.c==="乒乓球"?' selected':'')+'>乒乓球</option><option value="球鞋"'+(p&&p.c==="球鞋"?' selected':'')+'>球鞋</option><option value="配件"'+(p&&p.c==="配件"?' selected':'')+'>配件</option><option value="器材"'+(p&&p.c==="器材"?' selected':'')+'>器材</option></select></div>';h+='<div class="f-row"><label>'+t("brand")+'</label><input id="pfB" value="'+(p?p.b:"")+'"></div>';h+='<div class="f-row"><label>'+t("price")+'</label><input id="pfP" type="number" value="'+(p?p.p:99)+'"> <input id="pfO" type="number" value="'+(p?p.o:129)+'" style="width:100px" placeholder="原价"></div>';h+='<div class="f-row"><label>'+t("ins")+'</label><input id="pfS" type="number" value="'+(p?p.s:50)+'"></div>';h+='<div class="f-row"><label>图片</label><div class="img-up" id="pfImgPrev" style="height:120px" onclick="pickImg(\'product\')">'+(p&&p.iu?'<img src="'+p.iu+'">':(p?'<span style="font-size:36px">'+p.i+'</span>':'<span class="ph">📷</span>'))+'</div><input type="hidden" id="pfIu" value="'+(p&&p.iu?p.iu:"")+'"><input type="hidden" id="pfIi" value="'+(p?p.i:"📦")+'"></div>';h+='<div class="f-row"><label>描述</label><textarea id="pfD">'+(p?p.d:"")+'</textarea></div>';h+='<div class="f-row"><label>规格</label><input id="pfSp" value="'+(p?p.sp:"")+'"></div>';h+='<div class="f-row"><label>标签</label><input id="pfTg" value="'+(p?p.tags:"")+'" placeholder="逗号分隔"></div>';h+='<div class="f-row"><label>'+t("recommend")+'</label><select id="pfF"><option value="1"'+(p&&p.f?' selected':'')+'>是</option><option value="0"'+(p&&!p.f?' selected':'')+'>否</option></select></div>';h+='<div class="m-acts"><button class="btn btn-out" onclick="closeModal()">'+t("canc function saveProd(id){var n=document.getElementById("pfN").value.trim();if(!n){toast("请输入名称","err");return}var d={n:n,c:document.getElementById("pfC").value,b:document.getElementById("pfB").value,p:parseInt(document.getElementById("pfP").value)||99,o:parseInt(document.getElementById("pfO").value)||129,s:parseInt(document.getElementById("pfS").value)||0,i:document.getElementById("pfIi").value||"📦",iu:document.getElementById("pfIu").value||"",d:document.getElementById("pfD").value.trim(),sp:document.getElementById("pfSp").value.trim(),tags:document.getElementById("pfTg").value.trim(),f:document.getElementById("pfF").value==="1"};if(id>0){var idx=P.findIndex(function(x){return x.id===id});if(idx>=0){d.id=id;P[idx]=d}}else{d.id=Math.max.apply(null,P.map(function(x){return x.id}).concat([0]))+1;P.push(d)}save("p");closeModal();nav("products");toast(id>0?t("updated"):t("added"))}
function delProd(id){if(!confirm(t("confirmDelete")))return;P=P.filter(function(x){return x.id!==id});save("p");nav("products");toast(t("deleted"))}

function addCart(id){var p=P.find(function(x){return x.id===id});if(!p)return;if(p.s<1){toast(t("lowStock"),"err");return}var item=C.find(function(x){return x.id===id});if(item){item.q++}else{C.push({id:id,q:1})}save("c");updateCC();renderCart();toast(p.n+" +1","ok")}
function removeCart(idx){C.splice(idx,1);save("c");updateCC();renderCart()}
function chQty(idx,d){C[idx].q+=d;if(C[idx].q<=0){C.splice(idx,1)}save("c");updateCC();renderCart()}
function toggleCart(){var panel=document.getElementById("cartPanel");panel.classList.toggle("open");if(panel.classList.contains("open"))renderCart()}
function renderCart(){var items=document.getElementById("cartItems"),sum=document.getElementById("cartSum");if(!items)return;if(C.length===0){items.innerHTML="<div style='text-align:center;padding:40px;color:var(--t3)'>"+t("cartEmpty")+"</div>";sum.innerHTML="";return}var h="",total=0;C.forEach(function(ci,i){var p=P.find(function(x){return x.id===ci.id});if(!p)return;var sub=ci.q*p.p;total+=sub;h+="<div class='cart-item'><span style='font-size:24px'>"+p.i+"</span><div style='flex:1'><div style='font-weight:600'>"+p.n+"</div><div style='font-size:11px;color:var(--t2)'>"+fp(p.p)+" x "+ci.q+"</div></div><div style='text-align:right'><div style='color:var(--gc);font-weight:600'>"+fp(sub)+"</div><div style='margin-top:2px'><button class='btn btn-sm btn-out' onclick='chQty("+i+",-1)'>-</button><button class='btn btn-sm btn-out' onclick='chQty("+i+",1)'>+</button><button class='btn btn-sm btn-red' onclick='removeCart("+i+")'>x</button></div></div></div>"});items.innerHTML=h;sum.innerHTML="<div>"+t("total")+": <span class='total'>"+fp(total)+"</span></div><button class='btn btn-gold' onclick='checkout()'>"+t("checkout")+"</button>"}

var SHIP={domestic:[{id:"sf",name:"顺丰速运",price:15,days:"1-2天",track:!0},{id:"yt",name:"圆通快递",price:10,days:"2-4天",track:!0},{id:"zt",name:"中通快递",price:8,days:"3-5天",track:!0},{id:"yd",name:"韵达快递",price:10,days:"2-4天",track:!0},{id:"ems",name:"EMS邮政",price:20,days:"2-5天",track:!0},{id:"jd",name:"京东物流",price:12,days:"1-2天",track:!0},{id:"db",name:"德邦快递",price:15,days:"2-4天",track:!0}],international:[{id:"dhl",name:"DHL Express",price:25,days:"3-7天",track:!0},{id:"fedex",name:"FedEx",price:22,days:"4-8天",track:!0},{id:"ups",name:"UPS",price:20,days:"4-8天",track:!0},{id:"emsi",name:"EMS国际",price:18,days:"7-15天",track:!0},{id:"seaf",name:"海运",price:12,days:"20-45天",track:!1},{id:"aramex",name:"Aramex",price:15,days:"5-10天",track:!0},{id:"tnt",name:"TNT",price:21,days:"4-7天",track:!0}]};
function checkout(){if(C.length===0){toast(t("cartEmpty"),"err");return}var h="<h2>📋 "+t("checkout")+"</h2>";h+="<div id='chkF'><h4 style='margin-bottom:8px;color:var(--gc)'>📝 订单信息</h4>";h+="<div class='f-row'><label>"+t("name")+"*</label><input id='chkName' value=''></div>";h+="<div class='f-row'><label>"+t("phone")+"*</label><input id='chkPhone' value=''></div>";h+="<div class='f-row'><label>"+t("email")+"</label><input id='chkEmail' value=''></div>";h+="<div class='f-row'><label>"+t("country")+"</label><select id='chkCountry' onchange='upShipOpts()'><option value='CN'>中国</option><option value='US'>United States</option><option value='JP'>日本</option><option value='KR'>韩国</option><option value='DE'>Germany</option><option value='GB'>United Kingdom</option><option value='FR'>France</option><option value='SG'>Singapore</option><option value='TH'>Thailand</option></select></div>";h+="<div class='f-row'><label>"+t("addr")+"*</label><input id='chkAddr' value=''></div>";h+="<div class='f-row'><label>"+t("note")+"</label><input id='chkNote' value=''></div>";h+="<h4 style='margin-bottom:8px;color:var(--gc);margin-top:12px'>🚚 "+t("shipping")+"</h4>";h+="<div id='shipOpts' class='ship-grid'></div>";h+="<div id='shipCostDisplay' style='text-align:right;margin-top:8px;font-size:14px;color:var(--gc)'></div>";h+="<h4 style='margin-bottom:8px;color:var(--gc);margin-top:12px'>🛒 订单明细</h4>";var itemTotal=0;C.forEach(function(ci){var p=P.find(function(x){return x.id===ci.id});if(!p)return;var sub=ci.q*p.p;itemTotal+=sub;h+="<div style='display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bor);font-size:13px'><span>"+p.n+" x"+ci.q+"</span><span>"+fp(sub)+"</span></div>"});h+="<div style='display:flex;justify-content:space-between;padding:8px 0;font-size:18px;font-weight:700'><span>"+t("total")+"</span><span id='chkTotal' style='color:var(--gc)'>"+fp(itemTotal)+"</span></div>";h+="<div class='m-acts'><button class='btn btn-out' onclick='closeModal()'>"+t("cancel")+"</button><button class='btn btn-gold' onclick='placeOrder()'>✅ "+t("checkout")+"</button></div></div>";openModal(h);setTimeout(function(){upShipOpts()},100)}
function upShipOpts(){var country=document.getElementById("chkCountry").value;var isDomestic=country==="CN";var list=isDomestic?SHIP.domestic:SHIP.international;var curSymbol=isDomestic?"¥":"$";var h="";selShip="";shipCost=0;list.forEach(function(s,i){if(i===0){selShip=s.id;shipCost=s.price}var checked=i===0?" class='sel'":"";h+="<div class='ship-card"+checked+"' onclick='selShipOpt(\""+s.id+"\","+s.price+",this)'><div class='sc-name'>"+s.name+"</div><div class='sc-info'>⏱ "+s.days+(s.track?" | 📍可追踪":"")+"</div><div class='sc-price'>"+curSymbol+s.price+"</div></div>"});document.getElementById("shipOpts").innerHTML=h;updateShipDisplay()}
function selShipOpt(id,price,el){selShip=id;shipCost=price;document.querySelectorAll("#shipOpts .ship-card").forEach(function(c){c.classList.remove("sel")});el.classList.add("sel");updateShipDisplay()}
function updateShipDisplay(){var country=document.getElementById("chkCountry").value;var curSymbol=country==="CN"?"¥":"$";document.getElementById("shipCostDisplay").innerHTML="<span>"+t("shipCost")+": "+curSymbol+shipCost+"</span>";var itemTotal=C.reduce(function(s,ci){var p=P.find(function(x){return x.id===ci.id});return p?s+ci.q*p.p:s},0);document.getElementById("chkTotal").textContent=fp(itemTotal+shipCost)}
function placeOrder(){var name=document.getElementById("chkName").value.trim();var phone=document.getElementById("chkPhone").value.trim();var addr=document.getElementById("chkAddr").value.trim();if(!name||!phone||!addr){toast(t("fillInfo"),"err");return}var email=document.getElementById("chkEmail").value.trim();var country=document.getElementById("chkCountry").value;var note=document.getElementById("chkNote").value.trim();var items=C.map(function(ci){var p=P.find(function(x){return x.id===ci.id});return{id:ci.id,name:p?p.n:"",qty:ci.q,price:p?p.p:0}});var itemTotal=items.reduce(function(s,i){return s+i.qty*i.price},0);var allShips=SHIP.domestic.concat(SHIP.international);var found=allShips.find(function(s){return s.id===selShip});var shipInfo=found?{id:found.id,name:found.name,cost:shipCost,days:found.days}:null;var order={id:Date.now(),items:items,shipping:shipInfo,customer:{name:name,phone:phone,email:email,country:country,addr:addr,note:note},total:itemTotal+shipCost,status:"pending",date:new Date().toISOString(),tracking:""};O.unshift(order);C.forEach(function(ci){var p=P.find(function(x){return x.id===ci.id});if(p){p.s=Math.max(0,p.s-ci.q)}});var exist=CS.find(function(x){return x.phone===phone});if(!exist){CS.push({id:CS.length+1,name:name,phone:phone,email:email,country:country,addr:addr,orders:1,total:order.total,date:order.date});save("cs")}else{exist.orders++;exist.total+=order.total;save("cs")}C=[];save("c");save("o");save("p");updateCC();closeModal();updateCartPanel();nav("orders");toast(t("orderOK"),"ok");setTimeout(function(){showOrderDetail(order.id)},500)}
function updateCartPanel(){var items=document.getElementById("cartItems"),sum=document.getElementById("cartSum");if(items&&sum){if(C.length===0){items.innerHTML="<div style='text-align:center;padding:40px;color:var(--t3)'>"+t("cartEmpty")+"</div>";sum.innerHTML=""}else renderCart()}}

function showOrderDetail(id){var o=O.find(function(x){return x.id===id});if(!o)return;var h="<h2>📋 订单 #"+String(o.id).slice(-6)+"</h2>";h+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px'>";h+="<div><b>状态:</b> "+statusBadge(o.status)+"</div><div><b>日期:</b> "+fd(o.date)+"</div>";h+="<div><b>客户:</b> "+o.customer.name+"</div><div><b>电话:</b> "+o.customer.phone+"</div>";h+="<div><b>地址:</b> "+o.customer.addr+"</div><div><b>国家:</b> "+o.customer.country+"</div>";if(o.tracking)h+="<div><b>"+t("tracking")+":</b> "+o.tracking+"</div>";h+="</div>";h+="<table class='tbl' style='margin-top:12px'><tr><th>商品</th><th>数量</th><th>单价</th><th>小计</th></tr>";o.items.forEach(function(i){h+="<tr><td>"+i.name+"</td><td>"+i.qty+"</td><td>"+fp(i.price)+"</td><td>"+fp(i.qty*i.price)+"</td></tr>"});h+="<tr><td colspan='3'>"+t("shipping")+" ("+(o.shipping?o.shipping.name:"")+")</td><td>"+fp(o.shipping?o.shipping.cost:0)+"</td></tr>";h+="<tr style='font-weight:700'><td colspan='3'>"+t("total")+"</td><td style='color:var(--gc);font-size:16px'>"+fp(o.total)+"</td></tr></table>";h+="<div style='margin-top:12px;display:flex;gap:8px;flex-wrap:wrap'>";if(o.status==="pending")h+="<button class='btn btn-blue' onclick='upOrderStatus("+o.id+",\"confirmed\")'>✅ 确认订单</button>";if(o.status==="confirmed")h+="<button class='btn btn-blue' onclick='upOrderStatus("+o.id+",\"shipped\")'>📦 已发货</button>";if(o.status==="shipped")h+="<button class='btn btn-blue' onclick='upOrderStatus("+o.id+",\"delivered\")'>📬 已签收</button>";if(o.status!=="cancelled"&&o.status!=="delivered")h+="<button class='btn btn-red' onclick='upOrderStatus("+o.id+",\"cancelled\")'>❌ 取消</button>";h+="<button class='btn btn-out' onclick='printOrder("+o.id+")'>"+t("print")+"</button>";h+="<button class='btn btn-out' onclick='addTracking("+o.id+")'>📍 输入运单号</button></div>";h+="<div class='m-acts'><button class='btn btn-out' onclick='closeModal()'>"+t("close")+"</button></div>";openModal(h)}

function addTracking(id){var o=O.find(function(x){return x.id===id});if(!o)return;var tn=prompt(t("tracking")+":",o.tracking||"");if(tn!==null){o.tracking=tn.trim();save("o");closeModal();showOrderDetail(id)}}
function printOrder(id){var o=O.find(function(x){return x.id===id});if(!o)return;var w=window.open("","","width=700,height=600");var h='<html><head><meta charset="UTF-8"><title>订单 #'+String(o.id).slice(-6)+'</title><style>body{font-family:"Microsoft YaHei",sans-serif;padding:30px;font-size:13px;line-height:1.8}h2{border-bottom:2px solid #d4a853;padding-bottom:10px}table{width:100%;border-collapse:collapse;margin:12px 0}td,th{border:1px solid #ddd;padding:8px;text-align:left}th{background:#f5f5f5}.total{font-size:18px;font-weight:700;color:#d4a853}@media print{button{display:none}}</style></head><body>';h+='<h2>🏓 '+SET.name+' - 订单 #'+String(o.id).slice(-6)+'</h2>';h+='<p><b>日期:</b> '+fd(o.date)+' | <b>状态:</b> '+o.status+'</p>';h+='<p><b>客户:</b> '+o.customer.name+' | <b>电话:</b> '+o.customer.phone+'</p>';h+='<p><b>地址:</b> '+o.customer.addr+' ('+o.customer.country+')</p>';h+='<table><tr><th>商品</th><th>数量</th><th>单价</th><th>小计</th></tr>';o.items.forEach(function(i){h+='<tr><td>'+i.name+'</td><td>'+i.qty+'</td><td>'+fp(i.price)+'</td><td>'+fp(i.qty*i.price)+'</td></tr>'});h+='<tr><td colspan="3">运费 ('+(o.shipping?o.shipping.name:"")+')</td><td>'+fp(o.shipping?o.shipping.cost:0)+'</td></tr>';h+='<tr><td colspan="3" class="total">合计</td><td class="total">'+fp(o.total)+'</td></tr></table>';if(o.tracking)h+='<p><b>运单号:</b> '+o.tracking+'</p>';h+='<p style="font-size:11px;color:#999">感谢您的购买！旋转乒乓 Pro</p><button onclick="window.print()">打印</button></body></html>';w.document.write(h);w.document.close()}
function rOrders(){var h="<div class='sec'><h2>📋 "+t("ordersList")+"</h2>";if(O.length===0){h+="<div style='text-align:center;padding:40px;color:var(--t3)'>"+t("noOrders")+"</div>"}else{h+="<div class='tbl-container'><table class='tbl'><tr><th>订单号</th><th>客户</th><th>金额</th><th>状态</th><th>日期</th><th>物流</th><th></th></tr>";O.forEach(function(o){h+="<tr><td>#"+String(o.id).slice(-6)+"</td><td>"+o.customer.name+"</td><td style='color:var(--gc)'>"+fp(o.total)+"</td><td>"+statusBadge(o.status)+"</td><td>"+fd(o.date)+"</td><td>"+(o.shipping?o.shipping.name:"-")+"</td><td><button class='btn btn-sm btn-out' onclick='showOrderDetail("+o.id+")'>"+t("detail")+"</button></td></tr>"});h+="</table></div>"}return h+="</div>"}
function rLogistics(){var h="<div class='sec'><h2>🚚 "+t("logistics")+"</h2>";h+="<h4 style='color:var(--gc);margin-bottom:8px'>🇨🇳 "+t("domestic")+"</h4>";h+="<div class='tbl-container'><table class='tbl'><tr><th>快递</th><th>运费</th><th>时效</th><th>追踪</th></tr>";SHIP.domestic.forEach(function(s){h+="<tr><td><b>"+s.name+"</b></td><td>¥"+s.price+"</td><td>"+s.days+"</td><td>"+(s.track?"✅":"❌")+"</td></tr>"});h+="</table></div>";h+="<h4 style='color:var(--gc);margin:16px 0 8px'>🌍 "+t("intl")+"</h4>";h+="<div class='tbl-container'><table class='tbl'><tr><th>Courier</th><th>Cost</th><th>ETD</th><th>Tracking</th></tr>";SHIP.international.forEach(function(s){h+="<tr><td><b>"+s.name+"</b></td><td>$"+s.price+"</td><td>"+s.days+"</td><td>"+(s.track?"✅":"❌")+"</td></tr>"});h+="</table></div>";h+="<div style='margin-top:16px;padding:16px;background:var(--card);border:1px solid var(--bor);border-radius:var(--ra)'><h4 style='margin-bottom:8px'>🔍 运单追踪</h4>";h+="<div class='f-row'><label>运单号</label><input id='trkInput' placeholder='输入运单号...'></div>";h+="<div class='f-row'><label>快递</label><select id='trkCourier'><option value='sf'>顺丰</option><option value='yt'>圆通</option><option value='zt'>中通</option><option value='yd'>韵达</option><option value='ems'>EMS</option><option value='jd'>京东</option><option value='db'>德邦</option><option value='dhl'>DHL</option><option value='fedex'>FedEx</option><option value='ups'>UPS</option></select></div>";h+="<button class='btn btn-gold' style='margin-top:8px' onclick='lookupTracking()'>🔍 查询</button>";h+="<div id='trkResult' style='margin-top:12px;font-size:13px;color:var(--t2)'></div></div>";return h+="</div>"}
function lookupTracking(){var num=document.getElementById("trkInput").value.trim();if(!num){toast("请输入运单号","err");return}var c=document.getElementById("trkCourier").value;var n={sf:"顺丰速运",yt:"圆通快递",zt:"中通快递",yd:"韵达快递",ems:"EMS邮政",jd:"京东物流",db:"德邦快递",dhl:"DHL",fedex:"FedEx",ups:"UPS"};document.getElementById("trkResult").innerHTML="<div style='background:rgba(212,168,83,.08);padding:12px;border-radius:8px;border:1px solid rgba(212,168,83,.2)'><b>"+n[c]+"</b> - "+num+"<br><br>📍 快递已揽收 → 📦 运输中 → 📬 派送中<br><small style='color:var(--t3)'>(演示模式，实际请通过快递官网查询)</small></div>"}
function rCustomers(){var h="<div class='sec'><h2>👥 "+t("customers")+"</h2>";if(CS.length===0){h+="<div style='text-align:center;padding:40px;color:var(--t3)'>"+t("noCustomers")+"</div>"}else{h+="<div class='tbl-container'><table class='tbl'><tr><th>ID</th><th>"+t("name")+"</th><th>"+t("phone")+"</th><th>"+t("email")+"</th><th>"+t("country")+"</th><th>订单数</th><th>总消费</th><th></th></tr>";CS.forEach(function(c){h+="<tr><td>"+c.id+"</td><td>"+c.name+"</td><td>"+c.phone+"</td><td>"+(c.email||"-")+"</td><td>"+c.country+"</td><td>"+c.orders+"</td><td style='color:var(--gc)'>"+fp(c.total)+"</td><td><button class='btn btn-sm btn-out' onclick='viewCustomer("+c.id+")'>"+t("detail")+"</button></td></tr>"});h+="</table></div>"}return h+="</div>"}
function viewCustomer(id){var c=CS.find(function(x){return x.id===id});if(!c)return;var h="<h2>👤 "+c.name+"</h2>";h+="<div style='font-size:13px;line-height:2'><b>"+t("phone")+":</b> "+c.phone+"<br><b>"+t("email")+":</b> "+(c.email||"-")+"<br><b>"+t("country")+":</b> "+c.country+"<br><b>"+t("addr")+":</b> "+c.addr+"<br><b>订单数:</b> "+c.orders+"<br><b>总消费:</b> <span style='color:var(--gc);font-size:16px'>"+fp(c.total)+"</span></div>";h+="<div class='m-acts'><button class='btn btn-out' onclick='closeModal()'>"+t("close")+"</button></div>";openModal(h)}
function rAdmin(){var totalRevenue=O.filter(function(o){return o.status!=="cancelled"}).reduce(function(s,o){return s+o.total},0);var pendingOrders=O.filter(function(o){return o.status==="pending"}).length;var activeProducts=P.filter(function(p){return p.s>0}).length;var totalOrders=O.length;var h="<div class='sec'><h2>📊 "+t("dashboard")+"</h2>";h+="<div class='stats'><div class='stat'><div class='sv' style='color:var(--gc)'>"+cp(totalRevenue)+"</div><div class='sl'>"+t("revenue")+"</div></div>";h+="<div class='stat'><div class='sv' style='color:var(--ac)'>"+totalOrders+"</div><div class='sl'>"+t("orders")+"</div></div>";h+="<div class='stat'><div class='sv' style='color:var(--gr)'>"+activeProducts+"</div><div class='sl'>"+t("active")+"</div></div>";h+="<div class='stat'><div class='sv' style='color:var(--rd)'>"+pendingOrders+"</div><div class='sl'>"+t("pending")+"</div></div></div>";h+="<h4 style='color:var(--gc);margin:16px 0 8px'>📋 "+t("recentOrders")+"</h4>";var recent=O.slice(0,5);if(recent.length===0)h+="<div style='padding:20px;text-align:center;color:var(--t3)'>"+t("noOrders")+"</div>";else{h+="<div class='tbl-container'><table class='tbl'><tr><th>订单号</th><th>客户</th><th>金额</th><th>状态</th><th>日期</th></tr>";recent.forEach(function(o){h+="<tr><td>#"+String(o.id).slice(-6)+"</td><td>"+o.customer.name+"</td><td style='color:var(--gc)'>"+fp(o.total)+"</td><td>"+statusBadge(o.status)+"</td><td>"+fd(o.date)+"</td></tr>"});h+="</table></div>"}h+="<h4 style='color:var(--gc);margin:16px 0 8px'>⚙️ "+t("settings")+"</h4>";h+="<div class='f-row'><label>店名</label><input id='admName' value='"+SET.name+"'></div>";h+="<div class='f-row'><label>"+t("phone")+"</label><input id='admPhone' value='"+(SET.phone||"")+"'></div>";h+="<div class='f-row'><label>微信</label><input id='admWx' value='"+(SET.wechat||"")+"'></div>";h+="<div class='f-row'><label>"+t("email")+"</label><input id='admEmail' value='"+(SET.email||"")+"'></div>";h+="<div class='f-row'><label>"+t("addr")+"</label><input id='admAddr' value='"+(SET.addr||"")+"'></div>";h+="<div class='m-acts' style='margin-top:8px'><button class='btn btn-gold' onclick='saveSettings()'>💾 "+t("save")+"</button></div>";h+="<div style='display:flex;gap:10px;margin-top:12px;flex-wrap:wrap'>";h+="<button class='btn btn-out' onclick='exportData()'>📤 "+t("export")+"</button>";h+="<button class='btn btn-out' onclick='importData()'>📥 "+t("import")+"</button>";h+="<button class='btn btn-red' onclick='resetData()'>🔄 重置数据</button></div>";return h+="</div>"}
function saveSettings(){SET.name=document.getElementById("admName").value.trim()||SET.name;SET.phone=document.getElementById("admPhone").value.trim();SET.wechat=document.getElementById("admWx").value.trim();SET.email=document.getElementById("admEmail").value.trim();SET.addr=document.getElementById("admAddr").value.trim();save("set");document.getElementById("storeTitle").textContent="🏓 "+SET.name;toast("设置已保存")}
function exportData(){var d={products:P,orders:O,customers:CS,settings:SET,exportDate:new Date().toISOString()};var b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=SET.name.replace(/\s/g,"_")+"_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();toast("导出成功")}
function importData(){var input=document.createElement("input");input.type="file";input.accept=".json";input.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.products)P=d.products;if(d.orders)O=d.orders;if(d.customers)CS=d.customers;if(d.settings){SET=d.settings;document.getElementById("storeTitle").textContent="🏓 "+SET.name}save("p");save("o");save("cs");save("set");nav("admin");toast("导入成功")}catch(err){toast("文件格式错误","err")}};r.readAsText(f)};input.click()}
function resetData(){if(!confirm("确定要重置所有数据？此操作不可撤销！"))return;localStorage.removeItem("pp_p");localStorage.removeItem("pp_o");localStorage.removeItem("pp_c");localStorage.removeItem("pp_cs");localStorage.removeItem("pp_set");location.reload()}
// === IMAGE UPLOAD ===
var imgTarget="",tempImgData="";
function pickImg(target){imgTarget=target;tempImgData="";document.getElementById("imgModal").classList.add("show");document.getElementById("imgPrev").innerHTML='<span class="ph">📷 点击上传</span>';document.getElementById("imgUrl").value=""}
function handleImg(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){tempImgData=ev.target.result;document.getElementById("imgPrev").innerHTML='<img src="'+tempImgData+'" alt="preview">'};reader.readAsDataURL(file)}
function confirmImg(){if(!tempImgData){var url=document.getElementById("imgUrl").value.trim();if(url)tempImgData=url}if(!tempImgData){toast("请先选择图片或输入URL","err");return}if(imgTarget==="product"){document.getElementById("pfIu").value=tempImgData;document.getElementById("pfImgPrev").innerHTML='<img src="'+tempImgData+'">'}closeImgModal()}
function closeImgModal(){document.getElementById("imgModal").classList.remove("show");imgTarget="";tempImgData=""}
// === MODAL ===
function openModal(h){document.getElementById("modalBody").innerHTML=h;document.getElementById("modal").classList.add("show")}
function closeModal(){document.getElementById("modal").classList.remove("show")}
// === TOAST ===
function toast(msg,type){var el=document.createElement("div");el.className="toast toast-"+(type==="err"?"err":"ok");el.textContent=msg;el.style.position="fixed";el.style.top="16px";el.style.right="16px";el.style.padding="12px 20px";el.style.borderRadius="8px";el.style.fontSize="13px";el.style.zIndex="999";el.style.boxShadow="0 4px 12px rgba(0,0,0,.4)";el.style.color="#fff";el.style.background=type==="err"?"var(--rd)":"var(--gr)";el.style.animation="fadeIn .3s";document.body.appendChild(el);setTimeout(function(){el.remove()},3000)}
// === INIT ===
init();
</script>
